<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0a0a0a; --bg2:#111; --bg3:#161616; --accent:#c9a96e; --text:#fff; --text2:#a0a0a0; --border:rgba(255,255,255,0.08); --error:#ef4444; --success:#22c55e; }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
        body{background:var(--bg);color:var(--text);line-height:1.6;}
        .login-container{min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .login-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:40px;width:100%;max-width:400px;text-align:center;}
        .login-box h1{font-size:28px;margin-bottom:8px;font-weight:700;}
        .login-box p{color:var(--text2);margin-bottom:32px;font-size:14px;}
        .form-group{margin-bottom:20px;text-align:left;}
        .form-group label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:8px;}
        .form-group input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;}
        .form-group input:focus{border-color:var(--accent);}
        .btn{width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:opacity 0.2s;}
        .btn:hover{opacity:0.9;}
        .error{color:var(--error);font-size:14px;margin-top:12px;}
        .app{display:none;}
        .app.active{display:block;}
        .sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);padding:24px;}
        .sidebar h2{font-size:20px;margin-bottom:32px;}
        .nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;color:var(--text2);text-decoration:none;font-size:14px;margin-bottom:4px;cursor:pointer;transition:all 0.2s;border:none;background:none;width:100%;}
        .nav-item:hover,.nav-item.active{background:var(--bg3);color:var(--text);}
        .main{margin-left:260px;padding:32px;}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;}
        .header h1{font-size:24px;}
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px;}
        .stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:24px;}
        .stat-card h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:8px;}
        .stat-card .value{font-size:32px;font-weight:700;}
        .table-container{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
        table{width:100%;border-collapse:collapse;font-size:14px;}
        th{text-align:left;padding:16px;background:var(--bg2);color:var(--text2);font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:1px;}
        td{padding:16px;border-top:1px solid var(--border);}
        .badge{display:inline-block;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;}
        .badge-success{background:rgba(34,197,94,0.1);color:var(--success);}
        .badge-pending{background:rgba(201,169,110,0.1);color:var(--accent);}
        .btn-sm{padding:8px 16px;font-size:12px;border-radius:6px;border:none;cursor:pointer;}
        .btn-danger{background:var(--error);color:#fff;}
        .btn-edit{background:var(--accent);color:#000;}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:2000;}
        .modal.active{display:flex;}
        .modal-content{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:32px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
        .modal-header h2{font-size:20px;}
        .close-btn{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        .hidden{display:none !important;}
        @media(max-width:1024px){.sidebar{width:100%;position:relative;}.main{margin-left:0;}.stats-grid{grid-template-columns:1fr 1fr;}}
    </style>
</head>
<body>
    <div class="login-container" id="loginScreen">
        <div class="login-box">
            <h1>NOIR Admin</h1>
            <p>Sign in to manage your store</p>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password" required>
                </div>
                <button class="btn" type="submit">Sign In</button>
                <div class="error" id="loginError"></div>
            </form>
        </div>
    </div>

    <div class="app" id="adminApp">
        <div class="sidebar">
            <h2>NOIR</h2>
            <button class="nav-item active" onclick="showAdminTab('dashboard')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Dashboard
            </button>
            <button class="nav-item" onclick="showAdminTab('products')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                Products
            </button>
            <button class="nav-item" onclick="showAdminTab('orders')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                Orders
            </button>
            <button class="nav-item" onclick="showAdminTab('messages')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                Messages
            </button>
            <button class="nav-item" onclick="logout()" style="margin-top:auto;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Logout
            </button>
        </div>
        <div class="main">
            <div id="tab-dashboard" class="tab-content">
                <div class="header"><h1>Dashboard</h1><span id="currentDate"></span></div>
                <div class="stats-grid">
                    <div class="stat-card"><h3>Products</h3><div class="value" id="statProducts">-</div></div>
                    <div class="stat-card"><h3>Orders</h3><div class="value" id="statOrders">-</div></div>
                    <div class="stat-card"><h3>Revenue</h3><div class="value" id="statRevenue">-</div></div>
                    <div class="stat-card"><h3>Subscribers</h3><div class="value" id="statSubscribers">-</div></div>
                </div>
            </div>
            <div id="tab-products" class="tab-content hidden">
                <div class="header"><h1>Products</h1><button class="btn btn-sm btn-edit" onclick="openProductModal()">+ Add Product</button></div>
                <div class="table-container"><table><thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead><tbody id="productsTable"></tbody></table></div>
            </div>
            <div id="tab-orders" class="tab-content hidden">
                <div class="header"><h1>Orders</h1></div>
                <div class="table-container"><table><thead><tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody id="ordersTable"></tbody></table></div>
            </div>
            <div id="tab-messages" class="tab-content hidden">
                <div class="header"><h1>Messages</h1></div>
                <div class="table-container"><table><thead><tr><th>Name</th><th>Email</th><th>Subject</th><th>Message</th><th>Date</th></tr></thead><tbody id="messagesTable"></tbody></table></div>
            </div>
        </div>
    </div>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modalTitle">Add Product</h2><button class="close-btn" onclick="closeProductModal()">&times;</button></div>
            <form onsubmit="saveProduct(event)">
                <input type="hidden" id="prodId">
                <div class="form-row">
                    <div class="form-group"><label>Name</label><input type="text" id="prodName" required></div>
                    <div class="form-group"><label>Slug</label><input type="text" id="prodSlug" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Category</label><input type="text" id="prodCategory" required></div>
                    <div class="form-group"><label>Badge</label><input type="text" id="prodBadge" placeholder="New, Sale, etc."></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Price</label><input type="number" id="prodPrice" step="0.01" required></div>
                    <div class="form-group"><label>Original Price</label><input type="number" id="prodOriginal" step="0.01"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Stock</label><input type="number" id="prodStock" required></div>
                    <div class="form-group"><label>Rating</label><input type="number" id="prodRating" step="0.1" min="0" max="5" value="5"></div>
                </div>
                <div class="form-group"><label>Image URL</label><input type="text" id="prodImage" placeholder="https://..."></div>
                <div class="form-group"><label>Description</label><textarea id="prodDesc" rows="3" style="width:100%;padding:12px;background:#0a0a0a;border:1px solid var(--border);border-radius:8px;color:#fff;font-family:inherit;"></textarea></div>
                <div class="form-group"><label>Features (comma separated)</label><input type="text" id="prodFeatures" placeholder="Feature 1, Feature 2"></div>
                <button class="btn" type="submit">Save Product</button>
            </form>
        </div>
    </div>

    <script>
        const API = '';
        let token = localStorage.getItem('noir_admin_token');
        if (token) { document.getElementById('loginScreen').style.display='none'; document.getElementById('adminApp').classList.add('active'); loadDashboard(); }

        async function api(endpoint, opts={}) {
            const res = await fetch(`${API}${endpoint}`, { headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${token}`, ...opts.headers }, ...opts });
            if (res.status === 401) { logout(); throw new Error('Session expired'); }
            if (!res.ok) { const err = await res.json().catch(()=>({error:'Error'})); throw new Error(err.error); }
            return res.json();
        }

        async function handleLogin(e) {
            e.preventDefault();
            const pw = document.getElementById('adminPassword').value;
            try {
                const res = await fetch(`${API}/api/admin/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({password:pw}) });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                token = data.token;
                localStorage.setItem('noir_admin_token', token);
                document.getElementById('loginScreen').style.display='none';
                document.getElementById('adminApp').classList.add('active');
                loadDashboard();
            } catch(err) { document.getElementById('loginError').textContent = err.message; }
        }

        function logout() { token=''; localStorage.removeItem('noir_admin_token'); location.reload(); }

        function showAdminTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden'));
            document.getElementById('tab-'+tab).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if (tab==='products') loadProducts();
            if (tab==='orders') loadOrders();
            if (tab==='messages') loadMessages();
        }

        async function loadDashboard() {
            try {
                const stats = await api('/api/admin/stats');
                document.getElementById('statProducts').textContent = stats.products;
                document.getElementById('statOrders').textContent = stats.orders;
                document.getElementById('statRevenue').textContent = '$' + (stats.revenue || 0).toFixed(0);
                document.getElementById('statSubscribers').textContent = stats.subscribers;
                document.getElementById('currentDate').textContent = new Date().toLocaleDateString();
            } catch(e) { console.error(e); }
        }

        async function loadProducts() {
            try {
                const products = await api('/api/products');
                document.getElementById('productsTable').innerHTML = products.map(p => `
                    <tr>
                        <td><strong>${p.name}</strong></td>
                        <td>${p.category}</td>
                        <td>$${p.price}${p.original_price ? `<span style="text-decoration:line-through;color:#666;margin-left:8px;">$${p.original_price}</span>` : ''}</td>
                        <td>${p.stock}</td>
                        <td>
                            <button class="btn-sm btn-edit" onclick="editProduct(${p.id}, '${p.slug}')">Edit</button>
                            <button class="btn-sm btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch(e) { console.error(e); }
        }

        async function loadOrders() {
            try {
                const orders = await api('/api/orders');
                document.getElementById('ordersTable').innerHTML = orders.map(o => `
                    <tr>
                        <td>#${o.id}</td>
                        <td>${o.first_name || ''} ${o.last_name || ''}<br><small style="color:#666">${o.email}</small></td>
                        <td>$${o.total.toFixed(2)}</td>
                        <td><span class="badge badge-${o.status==='completed'?'success':'pending'}">${o.status}</span></td>
                        <td>${new Date(o.created_at).toLocaleDateString()}</td>
                        <td>
                            ${o.status === 'pending' ? `<button class="btn-sm btn-edit" onclick="updateOrder(${o.id},'completed')">Complete</button>` : ''}
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="6" style="text-align:center;color:#666">No orders yet</td></tr>';
            } catch(e) { console.error(e); }
        }

        async function loadMessages() {
            try {
                const msgs = await api('/api/admin/messages') || [];
                document.getElementById('messagesTable').innerHTML = msgs.map(m => `
                    <tr>
                        <td>${m.name}</td>
                        <td>${m.email}</td>
                        <td>${m.subject || '-'}</td>
                        <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.message}</td>
                        <td>${new Date(m.created_at).toLocaleDateString()}</td>
                    </tr>
                `).join('') || '<tr><td colspan="5" style="text-align:center;color:#666">No messages yet</td></tr>';
            } catch(e) { console.error(e); }
        }

        async function updateOrder(id, status) {
            try { await api(`/api/orders/${id}`, { method:'PATCH', body: JSON.stringify({status}) }); loadOrders(); }
            catch(e) { alert(e.message); }
        }

        function openProductModal() {
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('prodId').value = '';
            document.getElementById('prodName').value = '';
            document.getElementById('prodSlug').value = '';
            document.getElementById('prodCategory').value = '';
            document.getElementById('prodBadge').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodOriginal').value = '';
            document.getElementById('prodStock').value = '';
            document.getElementById('prodRating').value = '5';
            document.getElementById('prodImage').value = '';
            document.getElementById('prodDesc').value = '';
            document.getElementById('prodFeatures').value = '';
            document.getElementById('productModal').classList.add('active');
        }

        async function editProduct(id, slug) {
            try {
                const p = await api(`/api/products/${slug}`);
                document.getElementById('modalTitle').textContent = 'Edit Product';
                document.getElementById('prodId').value = id;
                document.getElementById('prodName').value = p.name;
                document.getElementById('prodSlug').value = p.slug;
                document.getElementById('prodCategory').value = p.category;
                document.getElementById('prodBadge').value = p.badge || '';
                document.getElementById('prodPrice').value = p.price;
                document.getElementById('prodOriginal').value = p.original_price || '';
                document.getElementById('prodStock').value = p.stock;
                document.getElementById('prodRating').value = p.rating;
                document.getElementById('prodImage').value = p.image || '';
                document.getElementById('prodDesc').value = p.description || '';
                document.getElementById('prodFeatures').value = (p.features || []).join(', ');
                document.getElementById('productModal').classList.add('active');
            } catch(e) { alert(e.message); }
        }

        async function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('prodId').value;
            const body = {
                name: document.getElementById('prodName').value,
                slug: document.getElementById('prodSlug').value,
                category: document.getElementById('prodCategory').value,
                badge: document.getElementById('prodBadge').value || null,
                price: parseFloat(document.getElementById('prodPrice').value),
                original_price: parseFloat(document.getElementById('prodOriginal').value) || null,
                stock: parseInt(document.getElementById('prodStock').value),
                rating: parseFloat(document.getElementById('prodRating').value),
                image: document.getElementById('prodImage').value || null,
                description: document.getElementById('prodDesc').value,
                features: document.getElementById('prodFeatures').value.split(',').map(f=>f.trim()).filter(Boolean)
            };
            try {
                if (id) await api(`/api/products/${id}`, { method:'PUT', body: JSON.stringify(body) });
                else await api('/api/products', { method:'POST', body: JSON.stringify(body) });
                closeProductModal();
                loadProducts();
                loadDashboard();
            } catch(e) { alert(e.message); }
        }

        async function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            try { await api(`/api/products/${id}`, { method:'DELETE' }); loadProducts(); loadDashboard(); }
            catch(e) { alert(e.message); }
        }

        function closeProductModal() { document.getElementById('productModal').classList.remove('active'); }
    </script>
</body>
</html>
